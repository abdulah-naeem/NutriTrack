<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NutriTrack — Free health and meal tracking app. Track calories, macros, and water intake with AI-powered suggestions. Uses multiple nutrition databases for accurate data.">
  <meta name="theme-color" content="#07070d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>NutriTrack — Health & Meal Tracker</title>

  <!-- Supabase SDK (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/index.css">

  <!-- Favicon (emoji-based) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍎</text></svg>">
</head>
<body>
  <!-- App Root -->
  <div id="app-root">
    <!-- Loading State -->
    <div class="auth-container" style="flex-direction: column; gap: 1rem;">
      <div style="width: 48px; height: 48px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #f97316; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
      <p style="color: #94a3b8; font-size: 0.875rem;">Loading NutriTrack...</p>
    </div>
  </div>

  <!-- App Module -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
